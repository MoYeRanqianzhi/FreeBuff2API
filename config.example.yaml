# FreeBuff2API 配置示例 — 复制为 config.yaml 并按需修改
#
# 所有字段均可在运行中修改：文件保存后 fsnotify + 15s 轮询会触发
# 秒级热加载（密钥池 / 上游地址 / 客户端鉴权 / 熔断参数全部生效），无需重启。
#
# 字段未设置时走内置默认值（见下方注释）。config.yaml 是**唯一**配置来源，
# 不再支持环境变量覆盖。

server:
  # HTTP 监听地址；默认 ":8080"
  listen: ":8080"

  # 客户端访问 /v1/* 时接受的 Bearer Token 列表；留空 [] 表示不启用下游鉴权。
  # 支持多 key，方便团队共享同一实例：
  # api_keys:
  #   - "sk-team-alice"
  #   - "sk-team-bob"
  # 当 token 本身是 sk-or-* 格式的 OpenRouter key 时，FreeBuff 全部失败会自动兜底到 OpenRouter。
  api_keys: []

upstream:
  # FreeBuff / codebuff 后端；默认 "https://www.codebuff.com"
  base_url: "https://www.codebuff.com"

  # 计费模式："free" 或 "normal"；free 需要账号本身处于 FREE 模式且非被限流的地区
  cost_mode: "free"

  # 当请求未携带 model 字段时的默认模型
  default_model: "anthropic/claude-sonnet-4"

  # OpenRouter 兜底：FreeBuff 本质是 openrouter 代理，直接兜底到官方可避免服务中断。
  # 行为矩阵：
  #   - 客户端 Bearer 匹配 sk-or-* 且不在 server.api_keys → 直接转发 OpenRouter（force fallback）
  #   - 客户端 Bearer 在 api_keys 中，且本身符合 sk-or-* → 先走 FreeBuff，失败再兜底 OpenRouter
  #   - enabled: false → 完全禁用，sk-or-* 会被 401 拒绝
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    enabled: true

auth:
  # ── 多账号密钥来源 ──
  # 方式 1：在此处内联填写 FreeBuff authToken；按列表顺序加入池中
  # api_keys:
  #   - "cb_live_xxx..."
  #   - "cb_live_yyy..."
  api_keys: []

  # 方式 2：将 codebuff credentials.json 放入下方目录（推荐，支持热加载）
  # 每个账号一个 .json，format 对齐 common/src/util/credentials.ts 的 userSchema
  dir: "auths"

  # 目录扫描兜底频率（fsnotify 有事件时立即生效，此项是网络 / Docker 卷驱动兜底）
  watch_interval: 15s

  # ── 熔断参数 ──
  breaker:
    # 连续失败多少次触发熔断
    threshold: 3
    # 熔断后跳过该 key 的时长，到期自动复活
    cooldown: 12h

logging:
  # 当前仅控制启动日志详细度；后续会扩展到请求日志
  level: info

# ── 可选 RPM 限速 ──
# 三层可选的每分钟请求数上限。0 = 不限（默认）。
# 策略：任一层拿不到令牌立即返回 429，不排队。
#
# account_rpm 同时是「负载均衡器」——当某个上游账号本分钟配额用完时，round-robin
# 会自动跳过它并选下一个，只有所有上游账号都达限时客户端才会收到 429。
#
# 客户端 Bearer token（server.api_keys 里的那些）独立计数 client_rpm，互不影响。
limits:
  global_rpm: 0     # 全号池总 RPM（所有客户端/账号共享）
  account_rpm: 0    # 每个上游账号独立 RPM
  client_rpm: 0     # 每个 client Bearer token 独立 RPM
