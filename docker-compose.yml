services:
  freebuff2api:
    build: .
    image: freebuff2api:latest
    container_name: freebuff2api
    restart: unless-stopped
    # Bind to host loopback + docker0 bridge gateway:
    #   - 127.0.0.1:28666 → host processes
    #   - 172.17.0.1:28666 → any container (via its default gateway)
    # External internet cannot reach either interface.
    ports:
      - "127.0.0.1:28666:8080"
      - "172.17.0.1:28666:8080"
    # Config hot-reloaded via fsnotify — edit config.yaml in place to apply.
    command: ["-config", "/app/config.yaml"]
    environment:
      # Env vars override config.yaml values (legacy-friendly; leave empty to
      # let config.yaml own everything).
      FREEBUFF_API_KEY: ${FREEBUFF_API_KEY:-}
      API_KEY: ${API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-}
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./auths:/app/auths:ro
    networks:
      - freebuff-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  freebuff-net:
    name: freebuff-net
    driver: bridge
